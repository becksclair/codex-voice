[tasks.setup]
description = "Build codex-voice, install it, and enable user services"
run = '''
set -eu

# Build the web frontend first: the release binary embeds web/dist at compile time.
(cd web && bun install --frozen-lockfile && bun run build)

cargo build --release -p codex-voice-app --bin codex-voice
sudo install -Dm755 target/release/codex-voice /usr/local/bin/codex-voice
sudo install -Dm755 packaging/codex-voice-wrapper.sh /usr/local/bin/codex-voice-wrapper

install -Dm644 packaging/applications/com.heliasar.CodexVoice.desktop "$HOME/.local/share/applications/com.heliasar.CodexVoice.desktop"
install -Dm644 packaging/systemd/user/codex-voice.service "$HOME/.config/systemd/user/codex-voice.service"

# Detect Tailscale IP and configure the server to bind to it when available.
TAILSCALE_IP=$(tailscale ip -4 2>/dev/null || true)
if [ -n "$TAILSCALE_IP" ]; then
    BIND_ADDR="${TAILSCALE_IP}:3845"
    sed "s|ExecStart=.*|ExecStart=/usr/local/bin/codex-voice-wrapper server --bind ${BIND_ADDR}|" \
        packaging/systemd/user/codex-voice-server.service \
        > "$HOME/.config/systemd/user/codex-voice-server.service"
    echo "Configured codex-voice-server to bind on Tailscale address: ${BIND_ADDR}"
else
    install -Dm644 packaging/systemd/user/codex-voice-server.service "$HOME/.config/systemd/user/codex-voice-server.service"
    echo "Tailscale not available; codex-voice-server will bind on 127.0.0.1:3845"
fi

# Remove legacy socat proxy service if it exists.
if [ -f "$HOME/.config/systemd/user/codex-voice-proxy.service" ]; then
    systemctl --user stop codex-voice-proxy.service 2>/dev/null || true
    systemctl --user disable codex-voice-proxy.service 2>/dev/null || true
    rm -f "$HOME/.config/systemd/user/codex-voice-proxy.service"
    echo "Removed legacy codex-voice-proxy.service"
fi

systemctl --user daemon-reload
systemctl --user enable --now codex-voice-server.service
systemctl --user enable codex-voice.service

systemctl --user --no-pager status codex-voice-server.service
systemctl --user is-enabled codex-voice.service
'''

[tasks.fmt]
description = "Check formatting"
dir = "{{cwd}}"
run = "cargo fmt --check"

[tasks.check]
description = "Type-check the workspace"
dir = "{{cwd}}"
run = "cargo check --workspace"

[tasks.test]
description = "Run the workspace test suite"
dir = "{{cwd}}"
run = "cargo test --workspace"

[tasks.lint]
description = "Clippy with warnings denied"
dir = "{{cwd}}"
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks.test-web]
description = "Run the Playwright web PWA behavioral suite (requires bun + chromium)"
dir = "{{cwd}}"
depends = ["web-build"]
run = "cd webtests && bunx playwright test"

[tasks.test-web-live]
description = "Run the single-run live TTS smoke (paid; requires real ~/.codex/read-aloud-defaults.json)"
dir = "{{cwd}}"
depends = ["web-build"]
run = "cd webtests && LIVE_TTS=1 bunx playwright test tests/live.spec.ts"

[tasks.web-install]
description = "Install frontend dependencies (web/)"
dir = "{{cwd}}"
run = "cd web && bun install --frozen-lockfile"

[tasks.web-build]
description = "Build the standalone React frontend (web/) into web/dist"
dir = "{{cwd}}"
depends = ["web-install"]
run = "cd web && bun run build"

[tasks.web-check]
description = "Lint, format-check, and type-check the standalone React frontend (web/)"
dir = "{{cwd}}"
depends = ["web-install"]
run = "cd web && bun run check"

[tasks.web-test]
description = "Run the standalone React frontend (web/) unit tests"
dir = "{{cwd}}"
depends = ["web-install"]
run = "cd web && bun run test"

[tasks.deny]
description = "Check dependencies for advisories, license, and source policy"
dir = "{{cwd}}"
run = "cargo deny check advisories licenses sources"

[tasks.verify]
description = "Run all verification gates"
depends = ["fmt", "check", "test", "lint", "web-check", "web-test"]
