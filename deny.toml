# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database (RustSec) and default severity handling.
# `cargo deny check advisories` fails on any active vulnerability or unmaintained
# advisory unless explicitly ignored below.
ignore = [
    # The Linux tray (tray-icon -> libappindicator) transitively requires the
    # gtk-rs GTK3 bindings, which are unmaintained upstream. This is accepted,
    # documented debt (see plans/README.md, deferred findings): no local action
    # is possible until tray-icon moves off GTK3. Unmaintained-only — these are
    # not vulnerabilities. Revisit when upstream migrates.
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdkx11
    "RUSTSEC-2024-0419", # gdkx11-sys
    "RUSTSEC-2024-0420", # gtk3-macros
    # proc-macro-error is unmaintained; pulled transitively by the same GTK3
    # tray stack (gtk3-macros). Same upstream cause, same rationale.
    "RUSTSEC-2024-0370",
]

[licenses]
# Permissive baseline. Only licenses listed here are allowed for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    # symphonia (audio decoding, via rodio) is MPL-2.0: weak file-level copyleft
    # on unmodified upstream dependencies, which is acceptable here.
    "MPL-2.0",
    # webpki-roots ships the Mozilla CA certificate set under the permissive
    # Community Data License Agreement.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# GTK3 and symphonia pull in known transitive duplicate versions of several
# crates. These duplicates are accepted rather than failing the build.
multiple-versions = "allow"
wildcards = "allow"

[sources]
# Only allow dependencies sourced from the primary crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
