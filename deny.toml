# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database (RustSec) and default severity handling.
# `cargo deny check advisories` fails on any active vulnerability or unmaintained
# advisory unless explicitly ignored below.
ignore = [
    # Tauri 2.11/Wry currently uses the archived gtk-rs GTK3 bindings on Linux.
    # These advisories are unmaintained notices, not reported vulnerabilities,
    # and have no safe in-range upgrade. Keep them individually enumerated so
    # any new GTK or non-GTK advisory still fails this gate.
    { id = "RUSTSEC-2024-0370", reason = "unmaintained proc-macro-error via Tauri GTK3 macros; no safe upgrade" },
    { id = "RUSTSEC-2024-0411", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0412", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0413", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0414", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0415", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0416", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0417", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0418", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0419", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },
    { id = "RUSTSEC-2024-0420", reason = "unmaintained GTK3 binding via Tauri/Wry; no safe upgrade" },

    # Tauri utilities reach the archived rust-unic crates through urlpattern.
    { id = "RUSTSEC-2025-0075", reason = "unmaintained rust-unic crate via Tauri urlpattern; no safe upgrade" },
    { id = "RUSTSEC-2025-0080", reason = "unmaintained rust-unic crate via Tauri urlpattern; no safe upgrade" },
    { id = "RUSTSEC-2025-0081", reason = "unmaintained rust-unic crate via Tauri urlpattern; no safe upgrade" },
    { id = "RUSTSEC-2025-0098", reason = "unmaintained rust-unic crate via Tauri urlpattern; no safe upgrade" },
    { id = "RUSTSEC-2025-0100", reason = "unmaintained rust-unic crate via Tauri urlpattern; no safe upgrade" },
]

[licenses]
# Permissive baseline. Only licenses listed here are allowed for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    # symphonia (audio decoding, via rodio) is MPL-2.0: weak file-level copyleft
    # on unmodified upstream dependencies, which is acceptable here.
    "MPL-2.0",
    # webpki-roots ships the Mozilla CA certificate set under the permissive
    # Community Data License Agreement.
    "CDLA-Permissive-2.0",
    # ksni (the Linux tray) is published under The Unlicense, a permissive
    # public-domain-equivalent dedication.
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# symphonia (audio decoding, via rodio) still pulls in known transitive
# duplicate versions of several crates. These duplicates are accepted rather
# than failing the build.
multiple-versions = "allow"
wildcards = "allow"

[sources]
# Only allow dependencies sourced from the primary crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
