# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use the default advisory database (RustSec) and default severity handling.
# `cargo deny check advisories` fails on any active vulnerability or unmaintained
# advisory unless explicitly ignored below.
ignore = [
    # --- Phantom GTK3 stack (never compiled) ---------------------------------
    # The Linux tray migrated to ksni + iced, so GTK3 is no longer compiled on
    # ANY target: `cargo tree -e normal | grep gtk` is empty on Linux, Windows,
    # and macOS. However `tray-icon` (retained for the macOS/Windows trays)
    # declares `libappindicator` -> gtk-rs as a hard `cfg(target_os = "linux")`
    # dependency of its own, so those crates remain in Cargo.lock. cargo-deny
    # filters the graph per-edge rather than per-path, so it still reports them
    # even though the path `tray-icon (macOS/Windows only)` -> `libappindicator
    # (Linux only)` never resolves for any single target. Unmaintained-only —
    # not vulnerabilities. These disappear only if tray-icon also leaves the
    # workspace (i.e. the macOS/Windows trays move off it too).
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdkx11
    "RUSTSEC-2024-0419", # gdkx11-sys
    "RUSTSEC-2024-0420", # gtk3-macros
    "RUSTSEC-2024-0370", # proc-macro-error (via gtk3-macros)

    # --- Introduced by the iced GUI stack ------------------------------------
    # ttf-parser is unmaintained with no safe upgrade available. It reaches us
    # through iced's text engine (cosmic-text -> fontdb) and only parses the
    # bundled, trusted Fira Sans font. Unmaintained-only, not a vulnerability.
    "RUSTSEC-2026-0192", # ttf-parser
    # quick-xml 0.39 DoS advisories (quadratic attribute scan; unbounded
    # namespace allocation). Reached only through `wayland-scanner`, a
    # build-time proc-macro that parses the trusted Wayland protocol XML files
    # bundled with the crate — never runtime, never attacker-controlled input.
    # wayland-scanner pins `quick-xml = "0.39"`, and the fixes landed in a later
    # minor, so no in-range upgrade exists without patching upstream.
    "RUSTSEC-2026-0194", # quick-xml quadratic attribute-name check
    "RUSTSEC-2026-0195", # quick-xml unbounded namespace allocation
]

[licenses]
# Permissive baseline. Only licenses listed here are allowed for dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    # symphonia (audio decoding, via rodio) is MPL-2.0: weak file-level copyleft
    # on unmodified upstream dependencies, which is acceptable here.
    "MPL-2.0",
    # webpki-roots ships the Mozilla CA certificate set under the permissive
    # Community Data License Agreement.
    "CDLA-Permissive-2.0",
    # ksni (the Linux tray) is published under The Unlicense, a permissive
    # public-domain-equivalent dedication.
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
# symphonia (audio decoding, via rodio) still pulls in known transitive
# duplicate versions of several crates. These duplicates are accepted rather
# than failing the build.
multiple-versions = "allow"
wildcards = "allow"

[sources]
# Only allow dependencies sourced from the primary crates.io registry.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
