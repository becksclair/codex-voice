name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file libasound2-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev pkg-config wget
      - run: cargo fmt --check
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cd web && bun install --frozen-lockfile && bun run check && bun run test && bun run build

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install desktop and browser build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file libasound2-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev pkg-config wget
      - run: cd web && bun install --frozen-lockfile && bun run build
      - run: cd webtests && bun install --frozen-lockfile && bunx playwright install --with-deps chromium
      - run: cargo build -q -p codex-voice-app --bin codex-voice
      - run: cd webtests && bunx playwright test

  windows-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: cargo install tauri-cli --version 2.11.4 --locked
      - shell: powershell
        run: packaging/windows/build-dist.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: codex-voice-windows-x64
          path: |
            dist/codex-voice-windows-x64-setup.exe
            dist/codex-voice-windows-x64-setup.exe.sha256
            dist/codex-voice-windows-x64.zip
            dist/codex-voice-windows-x64.zip.sha256

  macos-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
