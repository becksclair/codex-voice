  <title>Codex Voice</title>
  <script>
    (() => {
      const darkThemeColor = '#17091f';
      const lightThemeColor = '#f3dff1';
      const setManifest = (resolved) => {
        const manifest = document.querySelector('link[rel="manifest"]');
        if (!manifest) return;
        manifest.href = resolved === 'light'
          ? manifest.dataset.manifestLight || manifest.href
          : manifest.dataset.manifestDark || manifest.href;
      };
      try {
        const raw = localStorage.getItem('codex-voice.web.settings.v1');
        const preference = raw ? JSON.parse(raw).theme || 'auto' : 'auto';
        const resolved = preference === 'dark' || preference === 'light'
          ? preference
          : (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.dataset.theme = resolved;
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          'content',
          resolved === 'light' ? lightThemeColor : darkThemeColor
        );
        setManifest(resolved);
      } catch (_) {
        document.documentElement.dataset.theme = 'dark';
        setManifest('dark');
      }
    })();

    select {

      display: flex;
      align-items: center;

  </style>

  </main>
  <script>
    const text = document.getElementById('text');
    const generate = document.getElementById('generate');
    const generateLabel = document.getElementById('generate-label');
    const play = document.getElementById('play');
    const playIcon = document.getElementById('play-icon');
    const download = document.getElementById('download');
    const clear = document.getElementById('clear');
    const paste = document.getElementById('paste');
    const settingsToggle = document.getElementById('settings-toggle');
    const settingsPanel = document.getElementById('settings-panel');
    const providerSelect = document.getElementById('provider');
    const voiceSelect = document.getElementById('voice');
    const modelSelect = document.getElementById('model');
    const themeSelect = document.getElementById('theme');
    const emotion = document.getElementById('emotion');
    const summarize = document.getElementById('summarize');
    const generateOnPaste = document.getElementById('generate-on-paste');
    const seekSlider = document.getElementById('waveform-slider');
    const waveformCanvas = document.getElementById('waveform');
    const elapsed = document.getElementById('elapsed');
    const duration = document.getElementById('duration');
    const errorBanner = document.getElementById('error-banner');
    const count = document.getElementById('count');
    const textStorageKey = 'codex-voice.web.text';
    const configStorageKey = 'codex-voice.web.config.v1';
    const settingsStorageKey = 'codex-voice.web.settings.v1';
    const generationStateStorageKey = 'codex-voice.web.generation.v1';
    const generatedAudioDbName = 'codex-voice-web-audio';
    const generatedAudioStore = 'generated';
    const lastGeneratedAudioKey = 'last';
    const maxPendingGenerationAgeMs = 6 * 60 * 60 * 1000;
    const serverJobMaxPollMs = 10 * 60 * 1000;
    const defaultSpeechPrepAttemptTimeoutMs = 4000;
    const performanceTagsMaxOutputTokens = 384;
    const performanceTagsAbsoluteMaxOutputTokens = 4096;
    const minShortenOutputChars = 4000;
    const speechModelHint = 'gpt-4o-mini-tts';
    const darkThemeColor = '#17091f';
    const lightThemeColor = '#f3dff1';
    const themeMedia = window.matchMedia?.('(prefers-color-scheme: light)') || null;
    let audio = new Audio();
    let objectUrl = null;
    let currentAudioBlob = null;
    let seeking = false;
    let waveform = null;
    let waveformDecodeId = 0;
    let directConfig = loadCachedConfig();
    let settings = loadSettings();
    let serviceWorkerRefreshing = false;
    let pendingWorkerReload = false;
    let generationActive = false;
    let generationRunId = 0;
    let generationCancelled = false;
    let activeGenerationController = null;
    let lifecycleInterruptedGeneration = false;
    let activeStreamPlayback = null;
    applyThemeSetting(settings.theme);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/web-sw.js', { scope: '/web', updateViaCache: 'none' })
          .then((registration) => registration.update().catch(() => {}))
          .catch(() => {});
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (serviceWorkerRefreshing) return;
        pendingWorkerReload = true;
        reloadForWorkerUpdateWhenIdle();
      });
    }

    text.value = localStorage.getItem(textStorageKey) || '';
    updateVisualViewportLayout();
    updateCount();
    resetWaveform();
    applySettingsToForm();
    populateSettings();
    refreshConfig();
    initializeStoredState();

    function updateVisualViewportLayout() {
      const viewport = window.visualViewport;
      const height = viewport?.height || window.innerHeight || document.documentElement.clientHeight;
      const offsetTop = viewport?.offsetTop || 0;
      const keyboardInset = Math.max(0, (window.innerHeight || height) - height - offsetTop);
      document.documentElement.style.setProperty('--visual-viewport-height', `${height}px`);
      document.documentElement.style.setProperty('--visual-viewport-offset-top', `${offsetTop}px`);
      document.documentElement.classList.toggle('keyboard-open', keyboardInset > 80);
      scheduleWaveformDraw();
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateVisualViewportLayout);
      window.visualViewport.addEventListener('scroll', updateVisualViewportLayout);
    }
    window.addEventListener('resize', updateVisualViewportLayout);
    window.addEventListener('orientationchange', updateVisualViewportLayout);
    text.addEventListener('focus', updateVisualViewportLayout);
    text.addEventListener('blur', () => setTimeout(updateVisualViewportLayout, 120));

    function showError(message) {
      errorBanner.textContent = message || 'Something went wrong.';
      errorBanner.classList.add('visible');
    }

    function clearError() {
      errorBanner.textContent = '';
      errorBanner.classList.remove('visible');
    }

    function setGenerateProgress(value, label = 'Generate') {
      const progress = Math.max(0, Math.min(1, Number(value) || 0));
      generate.style.setProperty('--generate-progress', String(progress));
      generateLabel.textContent = label;
    }

    function setGenerating(active, label = 'Generate', progress = 0) {
      generate.classList.toggle('generating', active);
      setGenerateProgress(progress, label);
    }

    function playSvg(paused) {
      playIcon.innerHTML = paused
        ? '<path d="M8 5v14l11-7Z"/>'
        : '<path d="M8 5v14"/><path d="M16 5v14"/>';
      play.setAttribute('aria-label', paused ? 'Play' : 'Pause');
    }

    function sanitizeBrowserConfig(config) {
      if (config?.speechPrep?.codexAuth) {
        delete config.speechPrep.codexAuth;
      }
      return config;
    }

    function loadCachedConfig() {
      try {
        const raw = localStorage.getItem(configStorageKey);
        const config = raw ? sanitizeBrowserConfig(JSON.parse(raw)) : null;
        if (config) localStorage.setItem(configStorageKey, JSON.stringify(config));
        return config;
      } catch (_) {
        return null;
      }
    }

    function loadSettings() {
      const defaults = {
        provider: 'auto',
        voice: 'default',
        model: 'default',
        theme: 'auto',
        emotionPreprocessing: true,
        summarization: false,
        generateOnPaste: true
      };
      try {
        return { ...defaults, ...(JSON.parse(localStorage.getItem(settingsStorageKey) || '{}')) };
      } catch (_) {
        return defaults;
      }
    }

    function saveSettings() {
      settings = {
        provider: providerSelect.value || 'auto',
        voice: voiceSelect.value || 'default',
        model: modelSelect.value || 'default',
        theme: themeSelect.value || 'auto',
        emotionPreprocessing: emotion.checked,
        summarization: summarize.checked,
        generateOnPaste: generateOnPaste.checked
      };
      localStorage.setItem(settingsStorageKey, JSON.stringify(settings));
      applyThemeSetting(settings.theme);
    }

    function option(value, label) {
      const node = document.createElement('option');
      node.value = value;
      node.textContent = label;
      return node;
    }

    function applySettingsToForm() {
      providerSelect.value = settings.provider;
      voiceSelect.value = settings.voice;
      modelSelect.value = settings.model;
      themeSelect.value = settings.theme || 'auto';
      emotion.checked = settings.emotionPreprocessing;
      summarize.checked = settings.summarization;
      generateOnPaste.checked = settings.generateOnPaste !== false;
    }

    function resolvedTheme(preference = settings.theme || 'auto') {
      if (preference === 'dark' || preference === 'light') return preference;
      return themeMedia?.matches ? 'light' : 'dark';
    }

    function applyThemeSetting(preference = settings.theme || 'auto') {
      const resolved = resolvedTheme(preference);
      document.documentElement.dataset.theme = resolved;
      document
        .querySelector('meta[name="theme-color"]')
        ?.setAttribute('content', resolved === 'light' ? lightThemeColor : darkThemeColor);
      const manifest = document.querySelector('link[rel="manifest"]');
      if (manifest) {
        manifest.href = resolved === 'light'
          ? manifest.dataset.manifestLight || manifest.href
          : manifest.dataset.manifestDark || manifest.href;
      }
    }

    function personaEntries(config) {
      return Object.entries(config?.personas || {});
    }

    function personaSupportsProvider(persona, provider) {
      if (provider === 'elevenlabs') return Boolean(persona?.elevenlabs?.voiceId);
      return true;
    }

    function firstPersonaForProvider(config, provider) {
      const found = personaEntries(config).find(([, persona]) => personaSupportsProvider(persona, provider));
      return found ? found[0] : null;
    }

    function providerCanGenerate(config, provider) {
      if (provider === 'google') return Boolean(config?.providers?.google);
      if (provider === 'elevenlabs') {
        return Boolean(config?.providers?.elevenlabs && firstPersonaForProvider(config, 'elevenlabs'));
      }
      return false;
    }

    function providerModelOptions(config, provider) {
      const seen = new Set();
      const options = [];
      const pushModel = (value) => {
        if (!value || seen.has(value)) return;
        seen.add(value);
        options.push(value);
      };
      if (provider === 'google') {
        const google = config?.providers?.google;
        pushModel(google?.model);
        for (const model of google?.fallbackModels || []) pushModel(model);
      } else if (provider === 'elevenlabs') {
        pushModel(config?.providers?.elevenlabs?.modelId);
      }
      return options.map((model) => option(`${provider}:${model}`, model));
    }

    function populateSettings() {
      const priorProvider = providerSelect.value || settings.provider;
      const priorVoice = voiceSelect.value || settings.voice;
      const priorModel = modelSelect.value || settings.model;
      providerSelect.replaceChildren(option('auto', 'Auto'));
      if (providerCanGenerate(directConfig, 'google')) providerSelect.append(option('google', 'Google'));
      if (providerCanGenerate(directConfig, 'elevenlabs')) providerSelect.append(option('elevenlabs', 'ElevenLabs'));
      providerSelect.value = [...providerSelect.options].some((item) => item.value === priorProvider) ? priorProvider : 'auto';

      voiceSelect.replaceChildren(option('default', 'Default'));
      if (providerSelect.value !== 'elevenlabs') voiceSelect.append(option('provider-default', 'Provider default'));
      for (const [name, persona] of personaEntries(directConfig)) {
        if (!personaSupportsProvider(persona, providerSelect.value)) continue;
        voiceSelect.append(option(`persona:${name}`, persona.label || name));
      }
      voiceSelect.value = [...voiceSelect.options].some((item) => item.value === priorVoice) ? priorVoice : 'default';

      modelSelect.replaceChildren(option('default', 'Default'));
      if (providerSelect.value !== 'auto') {
        for (const modelOption of providerModelOptions(directConfig, providerSelect.value)) {
          modelSelect.append(modelOption);
        }
      }
      modelSelect.value = [...modelSelect.options].some((item) => item.value === priorModel) ? priorModel : 'default';
      saveSettings();
    }

    async function refreshConfig() {
      try {
        const response = await fetch('/web/config', { cache: 'no-store' });
        if (!response.ok) return;
        const config = sanitizeBrowserConfig(await response.json());
        if (config?.version !== 1 || !config.providers) return;
        directConfig = config;
        localStorage.setItem(configStorageKey, JSON.stringify(config));
        populateSettings();
      } catch (_) {}
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return '0:00';
      const whole = Math.floor(seconds);
      const minutes = Math.floor(whole / 60);
      return `${minutes}:${String(whole % 60).padStart(2, '0')}`;
    }

    function updateCount() {
      const chars = Array.from(text.value).length;
      count.textContent = `${chars} ${chars === 1 ? 'char' : 'chars'}`;
      clear.hidden = chars === 0;
    }

    function newWaveformState(mode = 'empty') {
      return {
        mode,
        peaks: [],
        duration: 0,
        bufferedDuration: 0,
        currentTime: 0,
        sampleRate: 24000,
        channels: 1,
        finished: false,
        drawing: false,
        decodeId: 0
      };
    }

    function resetWaveform() {
      waveformDecodeId += 1;
      waveform = newWaveformState('empty');
      setWaveformSeekable(false);
      setWaveformProgress(0);
      scheduleWaveformDraw();
    }

    function resetStreamingWaveform(sampleRate = 24000, channels = 1) {
      waveformDecodeId += 1;
      waveform = newWaveformState('streaming');
      waveform.sampleRate = sampleRate;
      waveform.channels = channels;
      setWaveformSeekable(false);
      setWaveformProgress(0);
      scheduleWaveformDraw();
    }

    function setWaveformSeekable(enabled) {
      seekSlider.setAttribute('aria-disabled', enabled ? 'false' : 'true');
      seekSlider.tabIndex = enabled ? 0 : -1;
    }

    function setWaveformProgress(progress) {
      seekSlider.style.setProperty('--seek-progress', String(clamp(progress, 0, 1)));
    }

    function waveformBufferedRatio() {
      if (!waveform || waveform.mode !== 'streaming') return 1;
      if (waveform.finished) return 1;
      if (waveform.bufferedDuration <= 0) return 0;
      return clamp(waveform.bufferedDuration / (waveform.bufferedDuration + 8), 0.12, 0.72);
    }

    function waveformPositionRatio() {
      if (!waveform) return 0;
      if (waveform.mode === 'complete') {
        return waveform.duration > 0 ? clamp(waveform.currentTime / waveform.duration, 0, 1) : 0;
      }
      if (waveform.mode === 'streaming') {
        const loaded = waveformBufferedRatio();
        return waveform.bufferedDuration > 0
          ? clamp((waveform.currentTime / waveform.bufferedDuration) * loaded, 0, loaded)
          : 0;
      }
      return 0;
    }

    function updateWaveformAria() {
      const max = waveform?.mode === 'complete'
        ? waveform.duration
        : waveform?.mode === 'streaming'
          ? waveform.bufferedDuration
          : 0;
      const now = Math.min(max || 0, Math.max(0, waveform?.currentTime || 0));
      seekSlider.setAttribute('aria-valuemax', String(Math.round(max || 0)));
      seekSlider.setAttribute('aria-valuenow', String(Math.round(now)));
      seekSlider.setAttribute('aria-valuetext', `${formatTime(now)} of ${max > 0 ? formatTime(max) : '0:00'}`);
      setWaveformSeekable((waveform?.mode === 'complete' && max > 0) || (waveform?.mode === 'streaming' && max > 0));
    }

    function setWaveformCurrent(seconds) {
      if (!waveform) return;
      const max = waveform.mode === 'complete' ? waveform.duration : waveform.bufferedDuration;
      waveform.currentTime = clamp(Number(seconds) || 0, 0, max || 0);
      setWaveformProgress(waveformPositionRatio());
      updateWaveformAria();
      scheduleWaveformDraw();
    }

    function cssColor(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function scheduleWaveformDraw() {
      if (!waveform || waveform.drawing) return;
      waveform.drawing = true;
      requestAnimationFrame(() => {
        if (!waveform) return;
        waveform.drawing = false;
        drawWaveform();
      });
    }

    function resizeWaveformCanvas(rect) {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.max(1, Math.round(rect.width * dpr));
      const height = Math.max(1, Math.round(rect.height * dpr));
      if (waveformCanvas.width !== width || waveformCanvas.height !== height) {
        waveformCanvas.width = width;
        waveformCanvas.height = height;
      }
      const ctx = waveformCanvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return ctx;
    }

    function drawRoundedBar(ctx, x, centerY, width, height, color) {
      const top = centerY - height / 2;
      const radius = Math.min(width / 2, height / 2);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, top, width, height, radius);
      ctx.fill();
    }

    function samplePeaks(peaks, count) {
      if (!peaks?.length || count <= 0) return [];
      const sampled = [];
      for (let i = 0; i < count; i += 1) {
        const start = Math.floor((i / count) * peaks.length);
        const end = Math.max(start + 1, Math.ceil(((i + 1) / count) * peaks.length));
        let max = 0;
        let sum = 0;
        let sumSquares = 0;
        let samples = 0;
        for (let j = start; j < end && j < peaks.length; j += 1) {
          const peak = clamp(peaks[j] || 0, 0, 1);
          max = Math.max(max, peak);
          sum += peak;
          sumSquares += peak * peak;
          samples += 1;
        }
        const mean = samples > 0 ? sum / samples : 0;
        const rms = samples > 0 ? Math.sqrt(sumSquares / samples) : 0;
        sampled.push(clamp((mean * 0.62) + (rms * 0.28) + (max * 0.1), 0, 1));
      }
      return sampled;
    }

    function peakContrastRange(peaks) {
      if (!peaks?.length) return { floor: 0, ceiling: 1 };
      const sorted = peaks.filter((peak) => Number.isFinite(peak)).map((peak) => clamp(peak, 0, 1)).sort((a, b) => a - b);
      if (!sorted.length) return { floor: 0, ceiling: 1 };
      const low = sorted[Math.floor((sorted.length - 1) * 0.12)];
      const high = sorted[Math.floor((sorted.length - 1) * 0.9)];
      return {
        floor: Math.max(0, low - 0.025),
        ceiling: Math.min(1, Math.max(high, low + 0.18))
      };
    }

    function drawEmptyWaveform(ctx, width, height, startX = 0) {
      const centerY = height / 2;
      const color = cssColor('--waveform-empty');
      for (let x = startX; x < width; x += 5) {
        drawRoundedBar(ctx, x, centerY, 2, 2 + ((Math.floor(x / 20) % 3) * 1.5), color);
      }
    }

    function drawPeakWaveform(ctx, width, height, loadedWidth, playedX) {
      const gap = 2;
      const barWidth = 2;
      const step = barWidth + gap;
      const centerY = height / 2;
      const maxBar = Math.max(12, height * 0.86);
      const count = Math.max(1, Math.floor(width / step));
      const loadedCount = Math.max(1, Math.floor(loadedWidth / step));
      const peaks = samplePeaks(waveform.peaks, loadedCount);
      const contrast = peakContrastRange(peaks);
      const contrastRange = Math.max(0.08, contrast.ceiling - contrast.floor);
      for (let i = 0; i < loadedCount; i += 1) {
        const x = i * step;
        const peak = peaks[i] || 0;
        const relativePeak = clamp((peak - contrast.floor) / contrastRange, 0, 1);
        const visualPeak = clamp((Math.pow(relativePeak, 0.86) * 0.94) + (peak * 0.08), 0, 1);
        const barHeight = Math.max(3, Math.min(maxBar, 3 + visualPeak * (maxBar - 3)));
        const color = x <= playedX ? cssColor('--waveform-played') : cssColor('--waveform-future');
        drawRoundedBar(ctx, x, centerY, barWidth, barHeight, color);
      }
      if (loadedWidth < width - step) drawEmptyWaveform(ctx, width, height, loadedWidth + step);
    }

    function drawWaveform() {
      const rect = waveformCanvas.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      const ctx = resizeWaveformCanvas(rect);
      ctx.clearRect(0, 0, rect.width, rect.height);

      for (let offset = 0; offset + 1 < bytes.length; offset += 2) {
        const value = bytes[offset] | (bytes[offset + 1] << 8);
        const signed = value >= 0x8000 ? value - 0x10000 : value;
        const amplified = clampPcm16(signed * gain);
        output[offset] = amplified & 0xff;
        output[offset + 1] = (amplified >> 8) & 0xff;
      }
      if (bytes.length % 2 === 1) output[bytes.length - 1] = bytes[bytes.length - 1];
      return output;

      const hasPending = pending.value !== null;
      const length = bytes.length + (hasPending ? 1 : 0);
      const evenLength = length - (length % 2);

        pending.value = hasPending ? pending.value : bytes[0];
        return new Uint8Array();
      }
      const output = new Uint8Array(evenLength);
      let outputOffset = 0;
      if (hasPending) {
        output[0] = pending.value;
        outputOffset = 1;
        pending.value = null;
      }
      const copyLength = evenLength - outputOffset;
      output.set(bytes.slice(0, copyLength), outputOffset);
      if (copyLength < bytes.length) pending.value = bytes[copyLength];
      return output;

        const output = buffer.getChannelData(channel);
        for (let frame = 0; frame < frameCount; frame += 1) {
          const offset = ((frame * channels) + channel) * 2;
          const value = (bytes[offset] | (bytes[offset + 1] << 8));
          const signed = value >= 0x8000 ? value - 0x10000 : value;
          output[frame] = signed / 32768;

        this.seekSerial = seekSerial;

        const nextContext = new this.Ctor();

          throw _;

        this.playing = wasPlaying;
        playSvg(!wasPlaying);
        this.updatePosition();

      setReplayBlob(blob) {
        this.replayBlob = blob;
        this.checkDrain();
      }

      markFinished() {
        this.finished = true;

        return clamp(this.seekOffset + Math.max(0, this.context.currentTime - this.startedAt), 0, this.estimatedDuration);
      }

      updatePosition() {
        if (activeStreamPlayback !== this || this.stopped) return;
        const current = this.elapsedSeconds();

        duration.textContent = this.finished ? formatTime(this.estimatedDuration) : 'Live';

          && !this.replayLoaded

    function openGeneratedAudioDb() {
      return new Promise((resolve, reject) => {

        request.onupgradeneeded = () => {
          request.result.createObjectStore(generatedAudioStore, { keyPath: 'id' });
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error('Could not open audio storage.'));
      });
    }

    async function withGeneratedAudioStore(mode, callback) {
      const db = await openGeneratedAudioDb();
      try {
        return await new Promise((resolve, reject) => {
          const transaction = db.transaction(generatedAudioStore, mode);
          const store = transaction.objectStore(generatedAudioStore);
          const request = callback(store);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error('Audio storage request failed.'));
          transaction.onerror = () => reject(transaction.error || new Error('Audio storage transaction failed.'));
        });
      } finally {
        db.close();
      }
    }

    async function saveLastGeneratedAudio(blob, generatedText, inputChanged) {

          text: generatedText,
          blob,
          mimeType: blob.type || 'audio/wav',
          inputChanged: Boolean(inputChanged),
          createdAt: new Date().toISOString()

    function parseCodexSse(text) {

        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (!data || data === '[DONE]') continue;
        const event = JSON.parse(data);
        if (event.type === 'response.output_text.delta' && typeof event.delta === 'string') {
          outputText += event.delta;
        } else if (event.type === 'response.completed' && event.response) {
          completed = event.response;

      if (outputText) return outputText;

        for (const block of item.content || []) {

      const basePrep = browserSpeechPrepForDirect(config);
      const maxTextLength = providerMaxTextLength(config, provider);
      const mustShorten = Array.from(input).length > maxTextLength;
      const prep = mustShorten
        ? speechPrepForProviderLimit(basePrep, maxTextLength)
        : options.forcePerformanceTags
          ? speechPrepForStreaming(basePrep)
          : basePrep;
      const strategy = speechPrepStrategy({ ...config, speechPrep: prep }, provider);
      const decision = prepareDecision(input, prep, strategy);
      if (!decision.shouldPrepare) {
        return { input, instructions: null, changed: false, skipped: true, reason: decision.reason, strategy, elapsedMs: 0 };
      }
      const cacheKey = `${prep.provider}\n${prep.mode}\n${prep.maxLength}\n${strategy}\n${input}`;
      if (prepCache?.has(cacheKey)) return prepCache.get(cacheKey);
      if (!prep.browserSupported) {
        const message = prep.mode === 'shorten'
          ? 'Configured summarization prep is server-only.'
          : 'Configured emotion prep is server-only.';
        if (options.requireBrowserPrep) throw nonRetryableError(message);
        const result = {
          input,
          instructions: null,
          changed: false,
          skipped: true,
          error: message,
          strategy,
          elapsedMs: 0
        };
        prepCache?.set(cacheKey, result);
        return result;
      }
      if (prep.provider === 'google' && !prep.apiKey) {
        throw new Error('Google emotion prep is missing an API key.');
      }
      if (prep.provider === 'codex' && !prep.codexAuth?.accessToken) {
        throw new Error('Codex emotion prep is missing cached auth.');
      }
      const startedAt = performance.now();
      const prepInput = prep.mode === 'shorten'
        ? truncateToChars(input, Number(prep.maxInputLength) || Infinity)
        : input;
      const prompt = prep.mode === 'shorten'
        ? buildShortenPrompt(prepInput, prep)
        : strategy === 'style-instruction'
          ? buildStyleInstructionPrompt(prepInput, prep, persona)
          : buildPerformanceTagsPrompt(prepInput, prep, persona);
      const body = {
        contents: [{ role: 'user', parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: prep.mode === 'shorten' ? 0.2 : 0.45,
          maxOutputTokens: prep.mode === 'shorten'
            ? clamp(Math.floor(prep.maxLength / 3), 64, 4096)
            : strategy === 'style-instruction'
              ? 128
              : performanceTagsOutputTokens(prepInput, prep),
          ...(prep.mode === 'performance-tags' ? {
            thinkingConfig: {
              thinkingLevel: 'MINIMAL'
            }
          } : {})
        }
      };
      const overallTimeoutMs = Number(prep.timeoutMs) || 30000;
      const attemptTimeoutMs = speechPrepAttemptTimeoutMs(prep);
      let lastError = null;
      try {
        for (const model of speechPrepModels(prep)) {
          const remainingMs = overallTimeoutMs - elapsedMs(startedAt);
          if (remainingMs <= 0) break;
          let response;
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), Math.min(attemptTimeoutMs, remainingMs));
          try {
            response = await fetchSpeechPrepAttempt(prep, model, body, prompt, controller.signal);
            if (!response.ok) {
              const error = await providerError(response, 'Emotion prep failed');
              lastError = error;
              console.warn(error.message);
              if (speechPrepErrorIsRetryable(error)) continue;
              const result = { input, instructions: null, changed: false, error: error.message, strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            let prepared = prep.provider === 'codex'
              ? parseCodexSse(await response.text()).trim()
              : extractTextOutput(await response.json()).trim();
            if (!prepared) {
              const result = { input, instructions: null, changed: false, error: 'Emotion prep returned no text.', strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            if (prep.mode === 'performance-tags' && strategy === 'inline-tags') {
              prepared = repairBareLeadingPerformanceCue(input, prepared, prep);
            }
            if (prep.mode === 'performance-tags' && strategy === 'inline-tags' && Array.from(prepared).length > prep.maxLength) {
              const result = { input, instructions: null, changed: false, error: 'Emotion prep returned text above the configured limit.', strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            if (prep.mode === 'performance-tags' && strategy === 'inline-tags' && !performanceTagsAreValid(input, prepared)) {
              const result = { input, instructions: null, changed: false, error: 'Emotion prep changed the text too much, so it was ignored.', strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            if (prep.mode === 'performance-tags' && strategy === 'style-instruction' && !styleInstructionIsValid(input, prepared)) {
              const result = { input, instructions: null, changed: false, error: 'Emotion prep returned an invalid delivery instruction, so it was ignored.', strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            const output = prep.mode === 'shorten'
              ? Array.from(prepared).slice(0, prep.maxLength).join('')
              : prepared;
            if (prep.mode === 'shorten' && Array.from(output).length < shortenMinOutputChars(input, prep)) {
              const extracted = extractiveShortenToFit(prepInput, prep.maxLength);
              const result = { input: extracted, instructions: null, changed: extracted !== input, warning: 'Summarization returned text below the minimum length, so a fitted source excerpt was used.', strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            if (strategy === 'style-instruction') {
              const result = { input, instructions: output, changed: false, strategy, elapsedMs: elapsedMs(startedAt) };
              prepCache?.set(cacheKey, result);
              return result;
            }
            const result = { input: output, instructions: null, changed: output !== input, strategy, elapsedMs: elapsedMs(startedAt) };
            prepCache?.set(cacheKey, result);
            return result;
          } catch (error) {
            if (prep.provider === 'codex' && error?.name === 'TypeError') {
              error.message = 'Codex direct emotion prep is blocked by the browser or network.';
            }
            lastError = error;
            if (speechPrepErrorIsRetryable(error)) continue;
            throw error;
          } finally {
            clearTimeout(timer);
          }
        }
        if (lastError) {
          const fallback = fallbackPerformanceTags(input, prep, strategy);
          if (fallback) {
            const result = {
              input: fallback,
              instructions: null,
              changed: true,
              warning: lastError?.message || 'Emotion prep failed, so a local sparse performance tag was used.',
              strategy,
              elapsedMs: elapsedMs(startedAt)
            };
            prepCache?.set(cacheKey, result);
            return result;
          }
          const result = {
            input,
            instructions: null,
            changed: false,
            error: lastError?.message || 'Emotion prep failed after retries.',
            strategy,
            elapsedMs: elapsedMs(startedAt)
          };
          prepCache?.set(cacheKey, result);
          return result;
        }
        const fallback = fallbackPerformanceTags(input, prep, strategy);
        if (fallback) {
          const result = {
            input: fallback,
            instructions: null,
            changed: true,
            warning: 'Emotion prep timed out, so a local sparse performance tag was used.',
            strategy,
            elapsedMs: elapsedMs(startedAt)
          };
          prepCache?.set(cacheKey, result);
          return result;
        }
        const result = { input, instructions: null, changed: false, error: 'Emotion prep timed out before a model returned text.', strategy, elapsedMs: elapsedMs(startedAt) };
        prepCache?.set(cacheKey, result);
        return result;
      } catch (error) {
        console.warn(error);
        const fallback = fallbackPerformanceTags(input, prep, strategy);
        if (fallback) {
          const result = {
            input: fallback,
            instructions: null,
            changed: true,
            warning: error?.message || 'Emotion prep failed, so a local sparse performance tag was used.',
            strategy,
            elapsedMs: elapsedMs(startedAt)
          };
          prepCache?.set(cacheKey, result);
          return result;
        }
        const result = {
          input,
          instructions: null,
          changed: false,
          error: error?.message || 'Emotion prep failed.',
          strategy,
          elapsedMs: elapsedMs(startedAt)
        };
        prepCache?.set(cacheKey, result);
        return result;
      }
    }

    function extractTextOutput(json) {
      const parts = json?.candidates?.[0]?.content?.parts || [];
      return parts.map((part) => part.text || '').filter(Boolean).join(' ');
    }

    function buildGoogleTtsPrompt(input, persona, instructions) {
      let prompt = 'Read the following text aloud.\n\n';
      if (persona) {
        prompt += 'Delivery profile:\n';
        if (persona.promptScene) prompt += `- scene: ${persona.promptScene}\n`;
        if (persona.promptStyle) prompt += `- style: ${persona.promptStyle}\n`;
        if (persona.promptPacing) prompt += `- pace: ${persona.promptPacing}\n`;
        for (const constraint of persona.promptConstraints || []) {
          prompt += `- constraint: ${constraint}\n`;
        }
        prompt += '\n';
        if (persona.promptSampleContext) {
          prompt += `Sample context: ${persona.promptSampleContext}\n\n`;
        }
      }
      if (instructions) {
        prompt += 'Additional delivery hints:\n';
        prompt += `- ${instructions}\n\n`;
      }
      prompt += 'Important:\n';
      prompt += '- speak the text exactly as written\n';
      prompt += '- do not add narration or commentary\n';
      prompt += '- do not change wording or paraphrase\n\n';
      prompt += `Text:\n"""${input}"""`;
      return prompt;
    }

    function parseSampleRate(mimeType) {
      const match = /rate=(\d+)/i.exec(mimeType || '');
      return match ? Number(match[1]) : 24000;
    }

    function writeAscii(view, offset, value) {
      for (let i = 0; i < value.length; i += 1) {
        view.setUint8(offset + i, value.charCodeAt(i));
      }
    }

    function wavBlobFromPcm(pcmBytes, sampleRate, channels = 1) {
      const header = new ArrayBuffer(44);
      const view = new DataView(header);
      const blockAlign = channels * 2;
      writeAscii(view, 0, 'RIFF');
      view.setUint32(4, 36 + pcmBytes.length, true);
      writeAscii(view, 8, 'WAVE');
      writeAscii(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, channels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * blockAlign, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true);
      writeAscii(view, 36, 'data');
      view.setUint32(40, pcmBytes.length, true);
      return new Blob([header, pcmBytes], { type: 'audio/wav' });
    }

    const ttsChunkMinChars = 1600;
    const ttsChunkMaxChars = 900;
    const ttsChunkBoundarySilenceMs = 180;

    function splitTtsText(input, maxChars = ttsChunkMaxChars) {
      const chunks = [];
      let remaining = String(input || '').trim();
      while (Array.from(remaining).length > maxChars) {
        const splitAt = splitIndexAtOrBefore(remaining, maxChars);
        const head = remaining.slice(0, splitAt).trim();
        if (head) chunks.push(head);
        remaining = remaining.slice(splitAt).trimStart();
      }
      if (remaining) chunks.push(remaining);
      return chunks;
    }

    function splitIndexAtOrBefore(input, maxChars) {
      const chars = Array.from(input);
      const hardLimit = chars.slice(0, maxChars).join('').length;
      const prefix = input.slice(0, hardLimit);
      for (const pattern of ['. ', '! ', '? ', '\n\n', '\n', '; ', ', ', ' ']) {
        const index = prefix.lastIndexOf(pattern);
        if (index >= 0) return index + pattern.length;
      }
      return hardLimit;
    }

    function concatUint8Arrays(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      for (const part of parts) {
        output.set(part, offset);
        offset += part.length;
      }
      return output;
    }

    function pcmBoundarySilence(sampleRate, channels = 1) {
      const frames = Math.floor((sampleRate * ttsChunkBoundarySilenceMs) / 1000);
      return new Uint8Array(frames * channels * 2);
    }

    function concatPcmChunksWithBoundarySilence(parts, sampleRate, channels = 1) {
      if (parts.length <= 1) return concatUint8Arrays(parts);
      const silence = pcmBoundarySilence(sampleRate, channels);
      const interleaved = [];
      parts.forEach((part, index) => {
        if (index > 0) interleaved.push(silence);
        interleaved.push(part);
      });
      return concatUint8Arrays(interleaved);
    }

    function asciiFromBytes(bytes, offset, length) {
      let value = '';
      for (let i = 0; i < length; i += 1) value += String.fromCharCode(bytes[offset + i]);
      return value;
    }

    function wavPcmData(bytes) {
      if (bytes.length < 44) throw new Error('WAV chunk is too small.');
      const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      if (asciiFromBytes(bytes, 0, 4) !== 'RIFF' || asciiFromBytes(bytes, 8, 4) !== 'WAVE') {
        throw new Error('WAV chunk has invalid RIFF/WAVE header.');
      }
      let offset = 12;
      let format = null;
      let data = null;
      while (offset + 8 <= bytes.length) {
        const id = asciiFromBytes(bytes, offset, 4);
        const size = view.getUint32(offset + 4, true);
        const body = offset + 8;
        if (body + size > bytes.length) break;
        if (id === 'fmt ') {
          format = {
            audioFormat: view.getUint16(body, true),
            channels: view.getUint16(body + 2, true),
            sampleRate: view.getUint32(body + 4, true),
            bitsPerSample: view.getUint16(body + 14, true)
          };
        } else if (id === 'data') {
          data = bytes.slice(body, body + size);
        }
        offset = body + size + (size % 2);
      }
      if (!format || !data) throw new Error('WAV chunk is missing fmt or data.');
      if (format.audioFormat !== 1 || format.bitsPerSample !== 16) {
        throw new Error('Only 16-bit PCM WAV chunks can be stitched.');
      }
      return { ...format, data };
    }

    function concatWavChunksWithBoundarySilence(parts) {
      const decoded = parts.map(wavPcmData);
      const first = decoded[0];
      if (!first) throw new Error('No WAV chunks to stitch.');
      for (const chunk of decoded) {
        if (chunk.sampleRate !== first.sampleRate || chunk.channels !== first.channels) {
          throw new Error('WAV chunks have mismatched sample rates or channels.');
        }
      }
      const pcm = concatPcmChunksWithBoundarySilence(
        decoded.map((chunk) => chunk.data),
        first.sampleRate,
        first.channels
      );
      return wavBlobFromPcm(pcm, first.sampleRate, first.channels);
    }

    function createPcmStreamSink() {
      const playback = new StreamingPlayback();
      const parts = [];
      const pendingByte = { value: null };
      let sampleRate = 24000;
      let channels = 1;
      return {
        playback,
        async start() {
          await playback.start();
        },
        onAudioChunk(bytes, meta = {}) {
          if (!bytes?.length) return;
          const pcm = evenPcmBytes(bytes, pendingByte);
          if (!pcm.length) return;
          const gained = applyPcm16Gain(pcm);
          sampleRate = Number(meta.sampleRate) || sampleRate;
          channels = Number(meta.channels) || channels;
          parts.push(gained);
          playback.appendPcm(gained, sampleRate, channels, pcm);
          setGenerateProgress(0.72, 'Streaming');
        },
        finish() {
          if (parts.length === 0) throw new Error('Streaming TTS did not return audio.');
          pendingByte.value = null;
          playback.markFinished();
          return wavBlobFromPcm(concatUint8Arrays(parts), sampleRate, channels);
        },
        fail() {
          playback.stop();
          if (activeStreamPlayback === playback) activeStreamPlayback = null;
        }
      };
    }

    function websocketBaseUrl(baseUrl) {
      const url = new URL(baseUrl || 'https://api.elevenlabs.io');
      url.protocol = url.protocol === 'http:' ? 'ws:' : 'wss:';
      return url.toString().replace(/\/$/, '');
    }

    function elevenLabsWebSocketModelSupported(model) {
      const normalized = String(model || '').toLowerCase();
      return Boolean(normalized) && !normalized.startsWith('eleven_v3');
    }

    function resolveElevenLabsStreamingModel(elevenlabs) {
      return resolveElevenLabsModel(elevenlabs);
    }

    function canStreamElevenLabs(config, persona) {
      const elevenlabs = config?.providers?.elevenlabs;
      if (!elevenlabs || !audioContextCtor() || !elevenlabs.apiKey || !persona?.elevenlabs?.voiceId) return false;
      const model = resolveElevenLabsStreamingModel(elevenlabs);
      return elevenLabsWebSocketModelSupported(model) ? Boolean(window.WebSocket) : Boolean(window.ReadableStream);
    }

    function canStreamGoogle(config) {
      const google = config?.providers?.google;
      if (!google || !audioContextCtor() || !window.ReadableStream) return false;
      const selected = normalizeGoogleModelName(resolveGoogleModel(google));
      return (google.streaming?.supportedModels || []).includes(selected);
    }

    function canStreamProvider(config, provider, persona) {
      if (provider === 'elevenlabs') return canStreamElevenLabs(config, persona);
      if (provider === 'google') return canStreamGoogle(config);
      return false;
    }

    async function streamElevenLabs(config, input, persona, signal = null, runId = generationRunId) {
      throwIfGenerationCancelled(signal, runId);
      const elevenlabs = config.providers?.elevenlabs;
      if (!canStreamElevenLabs(config, persona)) throw new Error('ElevenLabs streaming is not available.');
      const streamConfig = elevenlabs.streaming || {};
      const outputFormat = streamConfig.outputFormat || 'pcm_24000';
      const sampleRate = Number(streamConfig.sampleRate) || elevenLabsSampleRate(outputFormat);
      const channels = Number(streamConfig.channels) || 1;
      const modelId = resolveElevenLabsStreamingModel(elevenlabs);
      if (!elevenLabsWebSocketModelSupported(modelId)) {
        return streamElevenLabsHttp(config, input, persona, { outputFormat, sampleRate, channels, modelId }, signal, runId);
      }
      const voiceId = persona.elevenlabs.voiceId;
      const url = new URL(`${websocketBaseUrl(elevenlabs.baseUrl)}/v1/text-to-speech/${encodeURIComponent(voiceId)}/stream-input`);
      url.searchParams.set('model_id', modelId);
      url.searchParams.set('output_format', outputFormat);
      if (elevenlabs.languageCode) url.searchParams.set('language_code', elevenlabs.languageCode);
      if (elevenlabs.applyTextNormalization) {
        url.searchParams.set('apply_text_normalization', elevenlabs.applyTextNormalization);
      }

      const sink = createPcmStreamSink();
      await sink.start();
      setGenerateProgress(0.48, 'Connecting');

      return new Promise((resolve, reject) => {
        let settled = false;
        let opened = false;
        let receivedAudio = false;
        const socket = new WebSocket(url.toString());
        const abort = () => {
          try { socket.close(); } catch (_) {}
          fail(generationAbortError());
        };
        if (signal?.aborted) {
          abort();
          return;
        }
        signal?.addEventListener('abort', abort, { once: true });
        const finish = () => {
          if (settled) return;
          signal?.removeEventListener('abort', abort);
          try {
            const blob = sink.finish();
            settled = true;
            resolve({ blob, playback: sink.playback, streamingModel: modelId });
          } catch (error) {
            fail(error);
          }
        };
        const fail = (error) => {
          if (settled) return;
          signal?.removeEventListener('abort', abort);
          settled = true;
          sink.fail();
          reject(error instanceof Error ? error : new Error(String(error || 'ElevenLabs stream failed.')));
        };
        socket.addEventListener('open', () => {
          opened = true;
          const voiceSettings = persona?.elevenlabs?.voiceSettings
            ? { ...persona.elevenlabs.voiceSettings, speed: resolveElevenLabsSpeed(persona) }
            : { speed: 1.0 };
          socket.send(JSON.stringify({
            text: ' ',
            voice_settings: voiceSettings,
            generation_config: {
              chunk_length_schedule: streamConfig.chunkLengthSchedule || [120, 160, 250, 290]
            },
            xi_api_key: elevenlabs.apiKey
          }));
          socket.send(JSON.stringify({ text: input, flush: true }));
          socket.send(JSON.stringify({ text: '' }));
        });
        socket.addEventListener('message', (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.audio) {
              receivedAudio = true;
              sink.onAudioChunk(bytesFromBase64(data.audio), { sampleRate, channels });
            }
            if (data.isFinal) {
              socket.close();
              finish();
            }
          } catch (error) {
            try { socket.close(); } catch (_) {}
            fail(error);
          }
        });
        socket.addEventListener('error', () => fail(new Error('ElevenLabs WebSocket stream failed.')));
        socket.addEventListener('close', () => {
          if (!settled && opened && receivedAudio) finish();
          if (!settled) fail(new Error('ElevenLabs WebSocket closed before streaming audio.'));
        });
      });
    }

    async function streamElevenLabsHttp(config, input, persona, streamMeta, signal = null, runId = generationRunId) {
      throwIfGenerationCancelled(signal, runId);
      const elevenlabs = config.providers?.elevenlabs;
      const voiceId = persona.elevenlabs.voiceId;
      const outputFormat = streamMeta.outputFormat || 'pcm_24000';
      const sampleRate = Number(streamMeta.sampleRate) || elevenLabsSampleRate(outputFormat);
      const channels = Number(streamMeta.channels) || 1;
      const modelId = streamMeta.modelId || resolveElevenLabsStreamingModel(elevenlabs);
      const sink = createPcmStreamSink();
      await sink.start();
      setGenerateProgress(0.48, 'Connecting');
      const url = new URL(`${String(elevenlabs.baseUrl || 'https://api.elevenlabs.io').replace(/\/$/, '')}/v1/text-to-speech/${encodeURIComponent(voiceId)}/stream`);
      url.searchParams.set('output_format', outputFormat);
      const voiceSettings = persona?.elevenlabs?.voiceSettings
        ? { ...persona.elevenlabs.voiceSettings, speed: resolveElevenLabsSpeed(persona) }
        : { speed: 1.0 };
      const body = {
        text: input,
        model_id: modelId,
        voice_settings: voiceSettings,
        apply_text_normalization: elevenlabs.applyTextNormalization
      };
      if (elevenlabs.languageCode) body.language_code = elevenlabs.languageCode;
      const response = await fetch(url.toString(), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'xi-api-key': elevenlabs.apiKey
        },
        body: JSON.stringify(body),
        signal
      });
      if (!response.ok) {
        sink.fail();
        throw await providerError(response, 'ElevenLabs streaming TTS failed');
      }
      if (!response.body?.getReader) {
        sink.fail();
        throw new Error('ElevenLabs streaming response is not readable.');
      }
      try {
        const reader = response.body.getReader();
        for (;;) {
          throwIfGenerationCancelled(signal, runId);
          const { value, done } = await reader.read();
          if (done) break;
          sink.onAudioChunk(value, { sampleRate, channels });
        }
        const blob = sink.finish();
        return { blob, playback: sink.playback, streamingModel: modelId };
      } catch (error) {
        sink.fail();
        throw error;
      }
    }

    function googleInteractionsBaseUrl(baseUrl) {
      return String(baseUrl || 'https://generativelanguage.googleapis.com/v1beta').replace(/\/$/, '').replace(/\/models$/, '');
    }

    async function readGoogleInteractionStream(response, sink, sampleRate, channels, signal = null, runId = generationRunId) {
      if (!response.body?.getReader) throw new Error('Google streaming response is not readable.');
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      const handleEvent = (raw) => {
        const data = raw
          .split(/\r?\n/)
          .filter((line) => line.startsWith('data:'))
          .map((line) => line.slice(5).trim())
          .join('');
        const payload = data || raw.trim();
        if (!payload || payload === '[DONE]') return;
        const event = JSON.parse(payload);
        const delta = event.delta || event.step?.delta || event.output_audio || event.outputAudio;
        if (event.event_type === 'step.delta' || event.eventType === 'step.delta' || delta?.type === 'audio') {
          const audioData = delta?.data || delta?.audio || event.delta?.data;
          if (audioData) sink.onAudioChunk(bytesFromBase64(audioData), { sampleRate, channels });
        }
      };
      for (;;) {
        throwIfGenerationCancelled(signal, runId);
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let boundary;
        while ((boundary = buffer.search(/\r?\n\r?\n/)) >= 0) {
          const raw = buffer.slice(0, boundary);
          buffer = buffer.slice(buffer[boundary] === '\r' ? boundary + 4 : boundary + 2);
          handleEvent(raw);
        }
      }
      buffer += decoder.decode();
      if (buffer.trim()) handleEvent(buffer);
    }

    async function streamGoogle(config, input, persona, instructions, signal = null, runId = generationRunId) {
      throwIfGenerationCancelled(signal, runId);
      const google = config.providers?.google;
      if (!canStreamGoogle(config)) throw new Error('Google streaming is not available for this model.');
      const streamConfig = google.streaming || {};
      const sampleRate = Number(streamConfig.sampleRate) || 24000;
      const channels = Number(streamConfig.channels) || 1;
      const model = normalizeGoogleModelName(resolveGoogleModel(google));
      const voiceName = persona?.google?.voiceName || google.voice;
      const sink = createPcmStreamSink();
      await sink.start();
      setGenerateProgress(0.48, 'Connecting');
      const response = await fetch(`${googleInteractionsBaseUrl(google.baseUrl)}/interactions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Api-Revision': '2026-05-20',
          'x-goog-api-key': google.apiKey
        },
        body: JSON.stringify({
          model,
          input: buildGoogleTtsPrompt(input, persona, instructions),
          response_format: { type: 'audio' },
          generation_config: {
            speech_config: [{ voice: voiceName }]
          },
          stream: true
        }),
        signal
      });
      if (!response.ok) {
        sink.fail();
        throw await providerError(response, 'Google streaming TTS failed');
      }
      try {
        await readGoogleInteractionStream(response, sink, sampleRate, channels, signal, runId);
        const blob = sink.finish();
        return { blob, playback: sink.playback, streamingModel: model };
      } catch (error) {
        sink.fail();
        throw error;
      }
    }

    async function tryStreamProvider(config, provider, input, persona, instructions, signal = null, runId = generationRunId) {
      if (provider === 'elevenlabs' && canStreamElevenLabs(config, persona)) {
        return streamElevenLabs(config, input, persona, signal, runId);
      }
      if (provider === 'google' && canStreamGoogle(config)) {
        return streamGoogle(config, input, persona, instructions, signal, runId);
      }
      return null;
    }

    async function fetchGoogleAudio(config, input, persona, instructions, signal = null, runId = generationRunId) {
      throwIfGenerationCancelled(signal, runId);
      const google = config.providers?.google;
      if (!google) throw new Error('Google TTS is not configured.');
      const model = resolveGoogleModel(google);
      const voiceName = persona?.google?.voiceName || google.voice;
      const response = await fetch(`${google.baseUrl}/models/${encodeURIComponent(model)}:generateContent`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-goog-api-key': google.apiKey
        },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: buildGoogleTtsPrompt(input, persona, instructions) }] }],
          generationConfig: {
            responseModalities: ['AUDIO'],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName }
              }
            }
          }
        }),
        signal
      });
      if (!response.ok) throw await providerError(response, 'Google TTS failed');
      const json = await response.json();
      const parts = json?.candidates?.[0]?.content?.parts || [];
      const inline = parts.map((part) => part.inlineData || part.inline_data).find(Boolean);
      if (!inline?.data) throw new Error('Google TTS returned no audio.');
      const mimeType = inline.mimeType || inline.mime_type || 'audio/L16;codec=pcm;rate=24000';
      const bytes = bytesFromBase64(inline.data);
      return { bytes, mimeType };
    }

    // Synthesize chunks with bounded concurrency while preserving input order.
    // `fn` is invoked as `fn(chunk, index)`; results are returned in the same
    // order as `chunks`. Fails fast: the first rejection propagates immediately.
    async function synthesizeChunksOrdered(chunks, limit, fn) {
      const results = new Array(chunks.length);
      let nextIndex = 0;
      const worker = async () => {
        while (true) {
          const index = nextIndex++;
          if (index >= chunks.length) return;
          results[index] = await fn(chunks[index], index);
        }
      };
      const poolSize = Math.max(1, Math.min(limit, chunks.length));
      await Promise.all(Array.from({ length: poolSize }, () => worker()));
      return results;
    }

    async function synthesizeGoogle(config, input, persona, instructions, signal = null, runId = generationRunId) {
      if (Array.from(input).length >= ttsChunkMinChars) {
        const chunks = splitTtsText(input);
        if (chunks.length > 1) {
          const audios = await synthesizeChunksOrdered(chunks, 3, (chunk) => {
            throwIfGenerationCancelled(signal, runId);
            return fetchGoogleAudio(config, chunk, persona, instructions, signal, runId);
          });
          const mimeType = audios[0].mimeType || 'audio/L16;codec=pcm;rate=24000';
          const sampleRate = parseSampleRate(mimeType);
          if (audios.every((audio) => (audio.mimeType || '').toLowerCase().startsWith('audio/l16') || (audio.mimeType || '').toLowerCase().startsWith('audio/pcm'))) {
            return wavBlobFromPcm(concatPcmChunksWithBoundarySilence(audios.map((audio) => audio.bytes), sampleRate), sampleRate);
          }
          if (audios.every((audio) => (audio.mimeType || '').toLowerCase().startsWith('audio/wav'))) {
            return concatWavChunksWithBoundarySilence(audios.map((audio) => audio.bytes));
          }
          return new Blob(audios.map((audio) => audio.bytes), { type: mimeType });
        }
      }
      const { bytes, mimeType } = await fetchGoogleAudio(config, input, persona, instructions, signal, runId);
      if (mimeType.toLowerCase().startsWith('audio/l16') || mimeType.toLowerCase().startsWith('audio/pcm')) {
        return wavBlobFromPcm(bytes, parseSampleRate(mimeType));
      }
      return new Blob([bytes], { type: mimeType });
    }

    function resolveElevenLabsSpeed(persona) {
      const speed = persona?.elevenlabs?.voiceSettings?.speed;
      return Math.round(clamp(Number.isFinite(speed) ? speed : 1.0, 0.7, 1.2) * 100) / 100;
    }

    function elevenLabsMimeType(outputFormat) {
      if ((outputFormat || '').startsWith('wav')) return 'audio/wav';
      if ((outputFormat || '').startsWith('pcm')) return 'audio/pcm';
      if ((outputFormat || '').startsWith('opus')) return 'audio/opus';
      return 'audio/mpeg';
    }

    function elevenLabsSampleRate(outputFormat) {
      const match = /^pcm_(\d+)/i.exec(outputFormat || '');
      return match ? Number(match[1]) : 24000;
    }

    async function synthesizeElevenLabsSingle(config, input, persona, outputFormatOverride = null, rawPcm = false, signal = null, runId = generationRunId) {
      throwIfGenerationCancelled(signal, runId);
      const elevenlabs = config.providers?.elevenlabs;
      if (!elevenlabs) throw new Error('ElevenLabs TTS is not configured.');
      const voiceId = persona?.elevenlabs?.voiceId;
      if (!voiceId) throw new Error('ElevenLabs voice_id is not configured for this persona.');
      const voiceSettings = persona?.elevenlabs?.voiceSettings
        ? { ...persona.elevenlabs.voiceSettings, speed: resolveElevenLabsSpeed(persona) }
        : { speed: 1.0 };
      const outputFormat = outputFormatOverride || elevenlabs.outputFormat;
      const url = `${elevenlabs.baseUrl}/v1/text-to-speech/${encodeURIComponent(voiceId)}?output_format=${encodeURIComponent(outputFormat)}`;
      const body = {
        text: input,
        model_id: resolveElevenLabsModel(elevenlabs),
        voice_settings: voiceSettings,
        apply_text_normalization: elevenlabs.applyTextNormalization
      };
      if (elevenlabs.languageCode) body.language_code = elevenlabs.languageCode;
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'xi-api-key': elevenlabs.apiKey
        },
        body: JSON.stringify(body),
        signal
      });
      if (!response.ok) throw await providerError(response, 'ElevenLabs TTS failed');
      const bytes = await response.arrayBuffer();
      if ((outputFormat || '').startsWith('pcm') && !rawPcm) {
        return wavBlobFromPcm(new Uint8Array(bytes), elevenLabsSampleRate(outputFormat));
      }
      return new Blob([bytes], {
        type: response.headers.get('content-type') || elevenLabsMimeType(outputFormat)
      });
    }

    async function synthesizeElevenLabs(config, input, persona, signal = null, runId = generationRunId) {
      if (Array.from(input).length >= ttsChunkMinChars) {
        const chunks = splitTtsText(input);
        if (chunks.length > 1) {
          const outputFormat = 'pcm_24000';
          const parts = await synthesizeChunksOrdered(chunks, 3, async (chunk) => {
            throwIfGenerationCancelled(signal, runId);
            const blob = await synthesizeElevenLabsSingle(config, chunk, persona, outputFormat, true, signal, runId);
            return new Uint8Array(await blob.arrayBuffer());
          });
          const sampleRate = elevenLabsSampleRate(outputFormat);
          return wavBlobFromPcm(concatPcmChunksWithBoundarySilence(parts, sampleRate), sampleRate);
        }
      }
      return synthesizeElevenLabsSingle(config, input, persona, null, false, signal, runId);
    }

    function isRetryable(error) {
      if (error?.retryable === false) return false;
      if (!error?.status) return true;
      return error.status === 401 || error.status === 403 || error.status === 429 || error.status >= 500;
    }

    async function synthesizeProvider(config, provider, input, persona, prepCache, signal = null, runId = generationRunId) {
      setGenerateProgress(0.32, 'Preparing');
      const forcePerformanceTags = canStreamProvider(config, provider, persona);
      let prep = await prepareForProvider(config, provider, input, persona, prepCache, { forcePerformanceTags, requireBrowserPrep: true });
      if (prep.strategy === 'shorten' && prep.input !== input) {
        const performancePrep = await prepareForProvider(config, provider, prep.input, persona, prepCache, { forcePerformanceTags, requireBrowserPrep: true });
        if (performancePrep.input !== prep.input || performancePrep.instructions) {
          prep = {
            ...performancePrep,
            shortened: prep,
            elapsedMs: (prep.elapsedMs || 0) + (performancePrep.elapsedMs || 0)
          };
        }
      }
      const ttsStartedAt = performance.now();
      setGenerateProgress(0.44, 'Connecting');
      throwIfGenerationCancelled(signal, runId);
      try {
        const streamed = await tryStreamProvider(config, provider, prep.input, persona, prep.instructions, signal, runId);
        if (streamed) {
          return {
            blob: streamed.blob,
            input: prep.input,
            inputChanged: prep.input !== input,
            provider,
            prep,
            streamed: true,
            playback: streamed.playback,
            streamingModel: streamed.streamingModel,
            ttsElapsedMs: elapsedMs(ttsStartedAt)
          };
        }
      } catch (error) {
        console.warn(error);
        stopActiveStreamPlayback();
        setGenerateProgress(0.58, 'Fallback');
      }
      setGenerateProgress(0.64, 'Synthesizing');
      const blob = provider === 'google'
        ? await synthesizeGoogle(config, prep.input, persona, prep.instructions, signal, runId)
        : await synthesizeElevenLabs(config, prep.input, persona, signal, runId);
      return {
        blob,
        input: prep.input,
        inputChanged: prep.input !== input,
        provider,
        prep,
        ttsElapsedMs: elapsedMs(ttsStartedAt)
      };
    }

    async function generateDirect(input, signal = null, runId = generationRunId) {
      const config = directConfig;
      const prepCache = new Map();
      const selectedProvider = settings.provider !== 'auto' ? settings.provider : null;
      const primary = selectedProvider || resolveProvider(config, resolvePersona(config, null));
      const persona = resolvePersona(config, primary);
      try {
        return await synthesizeProvider(config, primary, input, persona, prepCache, signal, runId);
      } catch (error) {
        if (!isRetryable(error) || persona?.fallbackPolicy !== 'preserve-persona') throw error;
        const fallback = fallbackProvider(primary);
        if (!config.providers?.[fallback]) throw error;
        return await synthesizeProvider(config, fallback, input, persona, prepCache, signal, runId);
      }
    }

    function canGenerateDirectWithConfiguredPrep(config) {
      return Boolean(config?.providers?.google || config?.providers?.elevenlabs);
    }

    function settingsMatchServerDefaults() {
      return settings.provider === 'auto'
        && settings.voice === 'default'
        && settings.model === 'default'
        && settings.emotionPreprocessing === true
        && settings.summarization === false;
    }

    const serverJobPollMs = 1200;

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function createWebSpeechJob(input, signal = null) {
      const response = await fetch('/web/speech-jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal,
        body: JSON.stringify({ input })
      });
      if (!response.ok) {
        let message = `TTS job failed (${response.status})`;
        try {
          const json = await response.json();
          message = json?.error?.message || message;
        } catch (_) {}
        throw new Error(message);
      }
      const job = await response.json();
      if (!job?.id) throw new Error('TTS job did not return an id.');
      return job.id;
    }

    async function fetchWebSpeechJob(jobId, signal = null) {
      const response = await fetch(`/web/speech-jobs/${encodeURIComponent(jobId)}`, { cache: 'no-store', signal });
      if (!response.ok) {
        let message = `TTS job status failed (${response.status})`;
        try {
          const json = await response.json();
          message = json?.error?.message || message;
        } catch (_) {}
        throw new Error(message);
      }
      return response.json();
    }

    async function waitForWebSpeechJob(jobId, signal = null, runId = generationRunId) {
      const startedAt = Date.now();
      setGenerateProgress(0.82, 'Loading');
      for (;;) {
        throwIfGenerationCancelled(signal, runId);
        if (Date.now() - startedAt > serverJobMaxPollMs) {
          const error = new Error('TTS job stayed pending for too long. It was cleared so you can generate again.');
          error.status = 408;
          throw error;
        }
        const job = await fetchWebSpeechJob(jobId, signal);
        if (job.status === 'complete' && job.result) return job.result;
        if (job.status === 'failed') throw new Error(job.error?.message || 'TTS job failed.');
        setGenerateProgress(0.64, 'Synthesizing');
        await sleep(serverJobPollMs);
      }
    }

    async function generateViaServer(input, jobId = null, signal = null, runId = generationRunId) {
      setGenerateProgress(0.35, jobId ? 'Resuming' : 'Preparing');
      throwIfGenerationCancelled(signal, runId);
      const activeJobId = jobId || await createWebSpeechJob(input, signal);
      savePendingGeneration(input, activeJobId);
      const result = await waitForWebSpeechJob(activeJobId, signal, runId);
      return {
        blob: audioBlobFromBase64(result.audio_base64, result.mime_type),
        input: result.input,
        inputChanged: Boolean(result.input_changed),
        provider: 'server',
        jobId: activeJobId
      };
    }

    async function runGeneration(input, resumeJobId = null) {
      const runId = generationRunId + 1;
      generationRunId = runId;
      generationCancelled = false;
      const controller = new AbortController();
      activeGenerationController = controller;
      generate.disabled = true;
      clear.disabled = false;
      play.disabled = true;
      generationActive = true;
      lifecycleInterruptedGeneration = false;
      if (resumeJobId) savePendingGeneration(input, resumeJobId);
      clearError();
      setGenerating(true, 'Starting', 0.08);
      let resumeAfterLifecycleInterruption = false;
      try {
        let result;
        if (resumeJobId) {
          result = await generateViaServer(input, resumeJobId, controller.signal, runId);
        } else if (directConfig && canGenerateDirectWithConfiguredPrep(directConfig)) {
          setGenerateProgress(0.25, 'Direct');
          try {
            result = await generateDirect(input, controller.signal, runId);
          } catch (error) {
            if (!settingsMatchServerDefaults()) throw error;
            setGenerateProgress(0.25, 'Server');
            result = await generateViaServer(input, null, controller.signal, runId);
          }
        } else {
          setGenerateProgress(0.25, 'Server');
          result = await generateViaServer(input, null, controller.signal, runId);
        }
        throwIfGenerationCancelled(controller.signal, runId);
        if (
          typeof result.input === 'string'
          && result.input !== text.value
          && shouldApplyGeneratedText(input, result.input)
        ) {
          text.value = result.input;
          localStorage.setItem(textStorageKey, text.value);
          updateCount();
        }
        setGenerateProgress(0.9, 'Saving');
        await saveLastGeneratedAudio(result.blob, result.input, result.inputChanged);
        if (result.streamed && result.playback) {
          currentAudioBlob = result.blob;
          download.disabled = false;
          result.playback.setReplayBlob(result.blob);
          play.disabled = false;
        } else {
          loadAudioBlob(result.blob);
        }
        clearPendingGeneration();
        clearError();
        setGenerateProgress(1, 'Done');
      } catch (error) {
        const cancelled = generationCancelled || controller.signal.aborted || runId !== generationRunId;
        resumeAfterLifecycleInterruption = !cancelled && shouldKeepPendingGeneration(error);
        if (!resumeAfterLifecycleInterruption) clearPendingGeneration();
        play.disabled = !audio.src;
        if (!audio.src && !activeStreamPlayback) resetWaveform();
        if (!cancelled && !resumeAfterLifecycleInterruption) {
          showError(error.message || 'TTS failed.');
        }
      } finally {
        if (activeGenerationController === controller) activeGenerationController = null;
        if (runId === generationRunId) {
          generationActive = false;
          generate.disabled = false;
          clear.disabled = false;
          setTimeout(() => {
            if (!generationActive) setGenerating(false, 'Generate', 0);
          }, 350);
          reloadForWorkerUpdateWhenIdle();
        }
        if (
          resumeAfterLifecycleInterruption
          && document.visibilityState === 'visible'
          && loadPendingGeneration()
        ) {
          resumePendingGeneration();
        }
      }
    }

    async function generateCurrentText() {
      const input = text.value.trim();
      if (!input) {
        showError('Enter some text first.');
        return false;
      }
      if (generationActive) {
        cancelActiveGeneration();
        generationActive = false;
        generate.disabled = false;
        clear.disabled = false;
      }
      await runGeneration(input);
      return true;
    }

    function generateAfterPaste(event) {
      if (settings.generateOnPaste === false) return;
      const pastedText = event?.clipboardData?.getData('text') || '';
      if (!pastedText.trim()) return;
      const valueBeforePaste = text.value;
      setTimeout(() => {
        if (text.value === valueBeforePaste) return;
        const input = text.value.trim();
        if (!input) return;
        generateCurrentText().catch((error) => showError(error.message || 'TTS failed.'));
      }, 0);
    }

    text.addEventListener('input', () => {
      localStorage.setItem(textStorageKey, text.value);
      updateCount();
    });
    text.addEventListener('paste', generateAfterPaste);

    window.addEventListener('pagehide', () => {
      if (generationActive) lifecycleInterruptedGeneration = true;
      localStorage.setItem(textStorageKey, text.value);
    });

    window.addEventListener('pageshow', (event) => {
      if (event.persisted && !audio.src) restoreLastGeneratedAudio();
      if (generationActive) setGenerating(true, 'Generating', 0.45);
      if (!generationActive && loadPendingGeneration()) resumePendingGeneration();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible' && generationActive) {
        lifecycleInterruptedGeneration = true;
        return;
      }
      if (document.visibilityState === 'visible' && generationActive) setGenerating(true, 'Generating', 0.45);
      if (document.visibilityState === 'visible' && !generationActive && loadPendingGeneration()) {
        resumePendingGeneration();
      }
    });

    providerSelect.addEventListener('change', populateSettings);
    voiceSelect.addEventListener('change', saveSettings);
    modelSelect.addEventListener('change', saveSettings);
    themeSelect.addEventListener('change', saveSettings);
    emotion.addEventListener('change', saveSettings);
    summarize.addEventListener('change', saveSettings);
    generateOnPaste.addEventListener('change', saveSettings);
    function handleThemeMediaChange() {
      if ((settings.theme || 'auto') === 'auto') applyThemeSetting('auto');
    }

    if (themeMedia?.addEventListener) {
      themeMedia.addEventListener('change', handleThemeMediaChange);
    } else if (themeMedia?.addListener) {
      themeMedia.addListener(handleThemeMediaChange);
    }

    settingsToggle.addEventListener('click', () => {
      const open = settingsPanel.hasAttribute('hidden');
      settingsPanel.toggleAttribute('hidden', !open);
      settingsToggle.setAttribute('aria-expanded', String(open));
    });

    paste.addEventListener('click', async () => {
      try {
        const value = await navigator.clipboard.readText();
        text.value = '';
        if (!value) {
          localStorage.removeItem(textStorageKey);
          updateCount();
          return;
        }
        text.value = value;
        localStorage.setItem(textStorageKey, text.value);
        updateCount();
        clearError();
        if (settings.generateOnPaste !== false) await generateCurrentText();
      } catch (error) {
        showError(error.message || 'Clipboard paste failed.');
      }
    });

    clear.addEventListener('click', async () => {
      if (generationActive) {
        cancelActiveGeneration();
        generationActive = false;
        generate.disabled = false;
        clear.disabled = false;
        setGenerating(false, 'Generate', 0);
      }
      text.value = '';
      localStorage.removeItem(textStorageKey);
      clearPendingGeneration();
      updateCount();
      resetAudio();
      await deleteLastGeneratedAudio();
      clearError();
      text.focus();
    });

    generate.addEventListener('click', async () => {
      await generateCurrentText();
    });

    play.addEventListener('click', async () => {
      if (activeStreamPlayback) {
        try {
          await activeStreamPlayback.toggle();
        } catch (error) {
          showError(error.message || 'Streaming playback failed.');
        }
        return;
      }
      if (!audio.src) return;
      if (audio.paused) {
        try {
          await audio.play();
        } catch (error) {
          showError(error.message || 'Playback failed.');
        }
      } else {
        audio.pause();
      }
    });

    download.addEventListener('click', downloadCurrentAudio);

    seekSlider.addEventListener('pointerdown', (event) => {
      if (seekSlider.getAttribute('aria-disabled') === 'true') return;
      seekSlider.setPointerCapture?.(event.pointerId);
      handleWaveformPointer(event);
    });
    seekSlider.addEventListener('pointermove', (event) => {
      if (!seeking) return;
      handleWaveformPointer(event);
    });
    seekSlider.addEventListener('pointerup', (event) => {
      if (!seeking) return;
      handleWaveformPointer(event);
      seeking = false;
      seekSlider.classList.remove('scrubbing');
    });
    seekSlider.addEventListener('pointercancel', () => {
      seeking = false;
      seekSlider.classList.remove('scrubbing');
    });
    seekSlider.addEventListener('keydown', (event) => {
      if (seekSlider.getAttribute('aria-disabled') === 'true') return;
      const max = waveform?.mode === 'complete' ? waveform.duration : waveform?.bufferedDuration || 0;
      const step = event.shiftKey ? 10 : 5;
      let target = null;
      if (event.key === 'ArrowLeft' || event.key === 'ArrowDown') target = (waveform?.currentTime || 0) - step;
      if (event.key === 'ArrowRight' || event.key === 'ArrowUp') target = (waveform?.currentTime || 0) + step;
      if (event.key === 'Home') target = 0;
      if (event.key === 'End') target = max;
      if (target !== null) {
        event.preventDefault();
        showKeyboardScrubFeedback();
        seekToWaveformTime(clamp(target, 0, max));
      }
    });

    audio.addEventListener('loadedmetadata', updatePosition);
    audio.addEventListener('timeupdate', updatePosition);
    audio.addEventListener('play', () => {
      playSvg(false);
      clearError();
    });
    audio.addEventListener('pause', () => {
      playSvg(true);
    });
    audio.addEventListener('ended', () => {
      playSvg(true);
      updatePosition();
    });
  </script>
</body>
</html>
